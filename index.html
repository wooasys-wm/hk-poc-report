<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .menu-list {
            list-style: none;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .menu-item {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .menu-item a {
            display: block;
            padding: 30px 50px;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: 500;
        }

        .menu-item a:hover {
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Report Web</h1>
        <ul class="menu-list">
            <li class="menu-item">
                <a href="final_report.html">평택 권역 할당</a>
            </li>
            <li class="menu-item">
                <a href="#">중부 RDC 차량 도출</a>
            </li>
        </ul>
    </div>
</body>
</html>
